<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Block Design Visualizer</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/jsondiffpatch@0.4.1/dist/jsondiffpatch.umd.min.js"></script>
<style>
#uploadOverlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
#uploadOverlay.hidden { display: none !important; }
.upload-box {
  background: var(--panel);
  border: 2px dashed var(--line);
  border-radius: 16px;
  padding: 60px 40px;
  text-align: center;
  max-width: 520px;
  width: 90%;
  cursor: pointer;
  transition: border-color .2s, background .2s;
}
.upload-box:hover, .upload-box.dragover {
  border-color: var(--blue);
  background: #f0f7ff;
}
.upload-box .icon {
  font-size: 56px;
  margin-bottom: 16px;
  color: var(--muted);
}
.upload-box h2 { margin: 0 0 8px; font-size: 22px; }
.upload-box p { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
.upload-box .example-btn {
  display: inline-block;
  margin-top: 12px;
  padding: 8px 20px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--text);
  cursor: pointer;
  font: inherit;
  font-size: 13px;
  transition: border-color .15s;
}
.upload-box .example-btn:hover { border-color: var(--blue); color: var(--blue); }
#fileInput { display: none; }
.restore-banner {
  background: var(--panel);
  border: 1px solid var(--blue);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  max-width: 520px;
  width: 90%;
  box-shadow: 0 4px 16px rgba(37,99,235,.12);
}
.restore-icon { font-size: 32px; }
.restore-text { flex: 1; }
.restore-title { font-weight: 700; font-size: 15px; }
.restore-file { font-size: 12px; color: var(--muted); margin-top: 2px; }
.restore-actions { display: flex; gap: 8px; flex-shrink: 0; }
.restore-btn {
  padding: 8px 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--text);
  cursor: pointer;
  font: inherit;
  font-size: 13px;
  white-space: nowrap;
}
.restore-btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.restore-btn.primary:hover { opacity: .85; }
.restore-btn:hover:not(.primary) { border-color: var(--blue); }
</style>
</head>
<body>

<input type="file" id="fileInput" accept=".json,application/json">

<div id="uploadOverlay">
  <div id="restoreBanner" class="restore-banner" style="display:none">
    <div class="restore-icon">&#128190;</div>
    <div class="restore-text">
      <div class="restore-title">Continue where you left off</div>
      <div class="restore-file">Last design: <strong id="lastFileName"></strong></div>
    </div>
    <div class="restore-actions">
      <button id="restoreBtn" class="restore-btn primary">Restore</button>
      <button id="clearSavedBtn" class="restore-btn">Clear</button>
    </div>
  </div>
  <div class="upload-box" id="dropZone">
    <div class="icon">&#128228;</div>
    <h2>Upload Design JSON</h2>
    <p>Drop your <strong>.json</strong> design file here</p>
    <button class="example-btn" id="browseBtn" type="button">Browse files</button>
    <button class="example-btn" id="loadExample" type="button">Load Example</button>
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="pane-head">
      <h1>Block Design Visualizer</h1>
      <div class="subtle">Top: <strong id="topName"></strong> &middot; <span id="moduleCount">0</span> modules</div>
      <button class="upload-btn" id="reuploadBtn" title="Load another JSON file" style="margin-top:8px;border:1px solid var(--line);border-radius:6px;background:var(--panel);cursor:pointer;padding:4px 10px;font:inherit;font-size:12px;color:var(--text)">&#128228; Load File</button>
    </div>
    <div class="search">
      <input id="moduleSearch" type="search" placeholder="Search module or instance">
      <input id="traceInput" type="search" placeholder="Trace signal, port, or instance">
    </div>
    <div id="moduleList" class="module-list"></div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <div>
        <div id="activeTitle" class="active-title"></div>
        <div id="breadcrumb" class="breadcrumb"></div>
        <div id="activeMeta" class="subtle"></div>
      </div>
      <div class="toolbar-actions">
        <div class="tabs">
          <button class="tab-btn active" data-view="hierarchy">Hierarchy</button>
          <button class="tab-btn" data-view="netlist">Netlist</button>
          <button class="tab-btn" data-view="module">Module</button>
          <button class="tab-btn" data-view="trace">Trace</button>
        </div>
        <button class="icon-btn" id="zoomOut" title="Zoom out">&minus;</button>
        <button class="icon-btn" id="zoomIn" title="Zoom in">+</button>
        <button class="icon-btn" id="fitView" title="Fit view">&lfloor;</button>
        <button class="mode-btn" id="expandAll" title="Expand all trees in hierarchy view">Expand All</button>
        <button class="mode-btn" id="exportSvg" title="Export current diagram as PNG">Export PNG</button>
      </div>
    </div>
    <div class="canvas-shell">
      <div id="previewBanner" class="preview-banner" style="display:none">
        <span>Previewing modified design</span>
        <button id="exitPreviewBtn" class="preview-exit-btn">Exit preview</button>
      </div>
      <svg id="diagram" role="img" aria-label="Block design diagram"></svg>
      <div id="overview" class="overview"></div>
    </div>
  </main>

  <aside class="inspector">
    <div class="pane-head">
      <div class="inspector-tabs">
        <button class="inspector-tab active" data-panel="info">Inspector</button>
        <button class="inspector-tab" data-panel="chat">Chat</button>
      </div>
      <div id="inspectorHint" class="subtle">Load a design to begin</div>
    </div>

    <div class="inspector-content" data-content="info">
      <div class="section">
        <h2>Summary</h2>
        <div id="summary" class="kv"></div>
      </div>
      <div class="section">
        <h2>Connections</h2>
        <div id="connectionsPanel"></div>
      </div>
      <div class="section">
        <h2>JSON</h2>
        <pre id="jsonPanel">{}</pre>
      </div>
    </div>

    <div class="inspector-content" data-content="chat" style="display:none">
      <div class="chat-panel">
        <details class="chat-config">
          <summary>API Configuration</summary>
          <div class="config-row"><label>URL</label><input id="apiUrl" type="text" placeholder="https://api.openai.com/v1/chat/completions"></div>
          <div class="config-row"><label>Key</label><input id="apiKey" type="password" placeholder="sk-..."></div>
          <div class="config-row"><label>Model</label><input id="apiModel" type="text" placeholder="gpt-4o"></div>
          <div class="config-actions">
            <button id="saveApiConfig">Save</button>
            <button id="clearChat">Clear</button>
          </div>
          <div id="configStatus" class="config-status"></div>
        </details>
        <div id="chatMessages" class="chat-messages">
          <div class="chat-msg chat-msg-system">Configure your API above and send a message to start.</div>
        </div>
        <div class="chat-input-area">
          <textarea id="chatInput" rows="1" placeholder="Ask about the design or request a change..."></textarea>
          <button id="sendChatBtn" title="Send">&rarr;</button>
          <button id="stopChatBtn" title="Stop" style="display:none;background:#ef4444;">■</button>
        </div>
      </div>
    </div>
  </aside>
</div>

<script src="elk.bundled.js"></script>
<script src="app.js"></script>
<script>
(function () {
  var overlay = document.getElementById("uploadOverlay")
  var dropZone = document.getElementById("dropZone")
  var fileInput = document.getElementById("fileInput")
  var reuploadBtn = document.getElementById("reuploadBtn")

  function loadFile(file) {
    if (!file) return
    window.handleFileUpload(file)
  }

  dropZone.addEventListener("click", function () { fileInput.click() })

  dropZone.addEventListener("dragover", function (e) {
    e.preventDefault()
    dropZone.classList.add("dragover")
  })
  dropZone.addEventListener("dragleave", function () {
    dropZone.classList.remove("dragover")
  })
  dropZone.addEventListener("drop", function (e) {
    e.preventDefault()
    dropZone.classList.remove("dragover")
    var file = e.dataTransfer.files[0]
    if (file && file.name.endsWith(".json")) {
      loadFile(file)
    } else {
      alert("Please drop a .json file.")
    }
  })

  fileInput.addEventListener("change", function () {
    loadFile(fileInput.files[0])
    fileInput.value = ""
  })

  reuploadBtn.addEventListener("click", function () {
    fileInput.click()
  })

  document.getElementById("browseBtn").addEventListener("click", function (e) {
    e.stopPropagation()
    fileInput.click()
  })

  document.getElementById("loadExample").addEventListener("click", function (e) {
    e.stopPropagation()
    // Try to load from default path or URL param
    var params = new URLSearchParams(window.location.search)
    var exampleUrl = params.get("example") || "example.json"
    fetch(exampleUrl)
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status)
        return r.json()
      })
      .then(function (data) {
        window.loadModelFromJson(data)
      })
      .catch(function () {
        alert("No example.json found. Please upload a file.")
      })
  })

  // Support URL param: ?json=path/to/file.json
  var jsonParam = new URLSearchParams(window.location.search).get("json")
  if (jsonParam) {
    fetch(jsonParam)
      .then(function (r) { return r.json() })
      .then(function (data) { window.loadModelFromJson(data) })
      .catch(function () { /* silent */ })
  }

  // Restore last session
  var saved = window.getSavedDesign && window.getSavedDesign()
  if (saved) {
    document.getElementById("lastFileName").textContent = saved.fileName || "unnamed.json"
    document.getElementById("restoreBanner").style.display = "flex"
    document.getElementById("restoreBtn").addEventListener("click", function () {
      window.loadModelFromJson(saved.data, saved.fileName)
    })
    document.getElementById("clearSavedBtn").addEventListener("click", function () {
      window.clearSavedDesign()
      document.getElementById("restoreBanner").style.display = "none"
    })
  }
})()
</script>
</body>
</html>
